  c.fillStyle='#fefce8'; c.strokeStyle=OL; c.lineWidth=1.2;
  c.beginPath(); c.moveTo(x+31,y-29); c.bezierCurveTo(x+30,y-24,x+29,y-21,x+30,y-18); c.lineTo(x+33,y-21); c.bezierCurveTo(x+34,y-24,x+34,y-29,x+33,y-29); c.closePath(); c.fill(); c.stroke();
  c.beginPath(); c.moveTo(x+40,y-29); c.bezierCurveTo(x+39,y-24,x+38,y-21,x+39,y-18); c.lineTo(x+42,y-21); c.bezierCurveTo(x+43,y-24,x+43,y-29,x+42,y-29); c.closePath(); c.fill(); c.stroke();

  // whisker lines
  c.strokeStyle='rgba(255,255,255,0.7)'; c.lineWidth=1; c.lineCap='round';
  [[-1,0],[1,2],[3,4]].forEach(([a,b])=>{
    c.beginPath(); c.moveTo(x+42,y-32+a); c.lineTo(x+50,y-31+b); c.stroke();
    c.beginPath(); c.moveTo(x+32,y-32+a); c.lineTo(x+24,y-31+b); c.stroke();
  });

  c.restore();
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
// ─── FIRE BREATH ──────────────────────────────────────────────────────────────
function drawFireBreath(){
  if(!player.attacking || selectedChar!=='dino') return;
  const progress = 1 - player.attackTimer/26; // 0→1 over attack duration
  const fade = player.attackTimer <= 6 ? player.attackTimer/6 : 1;
  const dir = player.attackDir;
  // origin: dino snout
  const ox = dir>0 ? player.x+60 : player.x-12;
  const oy = player.y-60;
  const maxLen = 96;
  const len = maxLen * Math.min(1, progress*2.4);
  const layers = [
    { col:'#fef08a', rad:13, offset:0    },
    { col:'#fb923c', rad:10, offset:.25  },
    { col:'#ef4444', rad:7,  offset:.55  },
  ];
  ctx.save();
  for(const {col,rad,offset} of layers){
    const count = 5;
    for(let i=0;i<count;i++){
      const t2 = (i/count) + offset;
      if(t2 > progress) continue;
      const fx = ox + dir * t2 * len + Math.sin(frameCount*.3+i*1.3)*(3+i*1.5)*(1-t2);
      const fy = oy + Math.cos(frameCount*.25+i*0.9)*(2+i*1.2)*(1-t2);
      const r  = rad * (1 - t2*.55);
      ctx.globalAlpha = fade * (0.85 - t2*.4);
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(fx, fy, r, 0, Math.PI*2); ctx.fill();
    }
  }
  // heat shimmer ring at tip
  if(progress > .4){
    const tx = ox + dir*len, ty = oy;
    ctx.globalAlpha = fade * .5;
    ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(tx, ty, 8+progress*6, 0, Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── WIN SCENE ────────────────────────────────────────────────────────────────
function drawCrackingEgg(ex, ey, t, idx){
  const eggColors  = ['#fef3c7','#fce7f3','#e0f2fe','#d1fae5','#ede9fe'];
  const dinoColors = ['#22c55e','#f97316','#60a5fa','#facc15','#e879f9'];
  const col = eggColors[idx];
  const dcol = dinoColors[idx];
  const shake = (t>3 && t<48) ? Math.sin(t*1.1)*(3-t/20) : 0;
  const cx = ex + shake;

  if(t < 55){
    // whole egg
    ctx.fillStyle=col; ctx.strokeStyle=OL; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.ellipse(cx, ey, 22, 28, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    // cracks appear at t>18
    if(t>18){
      const cp = Math.min(1,(t-18)/30);
      ctx.strokeStyle=OL; ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(cx,ey-12); ctx.lineTo(cx+7*cp,ey-2); ctx.lineTo(cx-5*cp,ey+9*cp); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-10,ey-6); ctx.lineTo(cx-3*cp,ey+6*cp); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+8,ey-8); ctx.lineTo(cx+4*cp,ey+4*cp); ctx.stroke();
    }
  } else {
    // egg splits open
    const openP = Math.min(1,(t-55)/35);
    const liftY  = openP * 30;

    // bottom shell
    ctx.fillStyle=col; ctx.strokeStyle=OL; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.ellipse(cx, ey+6, 22, 20, 0, 0, Math.PI); ctx.fill(); ctx.stroke();

    // baby dino peeks out — proper dino silhouette
    if(t > 65){
      const peekP = Math.min(1,(t-65)/30);
      const hy = ey + 4 - peekP*22;
      const sc = peekP;
      const headColors=['#86efac','#fdba74','#bfdbfe','#fef08a','#f5d0fe'];
      const hcol = headColors[idx];

      // tail hint (left side)
      ctx.strokeStyle=dcol; ctx.lineWidth=Math.max(1,5*sc); ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(cx-8*sc,hy+6); ctx.quadraticCurveTo(cx-18*sc,hy+2,cx-20*sc,hy-4); ctx.stroke();

      // body
      ctx.fillStyle=dcol; ctx.strokeStyle=OL; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(cx, hy+5, 14*sc, 10*sc, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();

      if(peekP > 0.4){
        // dorsal spike
        ctx.fillStyle='#fbbf24'; ctx.strokeStyle=OL; ctx.lineWidth=1.2;
        ctx.beginPath();
        ctx.moveTo(cx-5,hy-4); ctx.lineTo(cx,hy-14*sc); ctx.lineTo(cx+5,hy-4);
        ctx.closePath(); ctx.fill(); ctx.stroke();

        // neck
        ctx.fillStyle=dcol; ctx.strokeStyle=OL; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.ellipse(cx+10*sc, hy, 5*sc, 8*sc, 0.3, 0, Math.PI*2); ctx.fill(); ctx.stroke();

        // head (offset to right)
        ctx.fillStyle=hcol; ctx.strokeStyle=OL; ctx.lineWidth=1.8;
        ctx.beginPath(); ctx.arc(cx+17*sc, hy-5, 9*sc, 0, Math.PI*2); ctx.fill(); ctx.stroke();

        // snout triangle (pointing right)
        ctx.fillStyle=dcol; ctx.strokeStyle=OL; ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(cx+22*sc,hy-5); ctx.lineTo(cx+29*sc,hy-2); ctx.lineTo(cx+29*sc,hy-8);
        ctx.closePath(); ctx.fill(); ctx.stroke();

        // eye (single, on head)
        ctx.fillStyle='#fff'; ctx.strokeStyle=OL; ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(cx+15*sc, hy-8, 3.5*sc, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle='#1e3a8a'; ctx.beginPath(); ctx.arc(cx+16*sc, hy-8, 2*sc, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx+17*sc, hy-9, 0.9, 0, Math.PI*2); ctx.fill();
      }
    }

    // top shell rises above baby
    ctx.fillStyle=col; ctx.strokeStyle=OL; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.ellipse(cx, ey-6-liftY, 22, 20, 0, Math.PI, Math.PI*2); ctx.fill(); ctx.stroke();

    // burst sparkles when egg first opens
    if(t >= 55 && t < 78){
      const sp = (t-55)/23;
      for(let s=0;s<8;s++){
        const ang = (s/8)*Math.PI*2;
        const sr = 18+sp*40;
        const sx2 = cx+Math.cos(ang)*sr, sy2 = ey+Math.sin(ang)*sr*.55;
        ctx.globalAlpha = 1-sp;
        ctx.fillStyle = ['#fbbf24','#34d399','#60a5fa','#f472b6','#a78bfa'][s%5];
        ctx.beginPath(); ctx.arc(sx2,sy2,3.5,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1;
    }
  }
}

function drawWinScene(){
  // dark overlay fade in
  const fadeA = Math.min(0.88, winTimer/40);
  ctx.fillStyle=`rgba(4,8,28,${fadeA})`;
  ctx.fillRect(0,0,W,H);

  // title
  const ta = Math.min(1,(winTimer-10)/25);
  if(ta>0){
    ctx.globalAlpha=ta;
    ctx.fillStyle='#fbbf24'; ctx.font='bold 20px "Press Start 2P"';
    ctx.textAlign='center';
    ctx.fillText('VOCÊ VENCEU!', W/2, 68);
    ctx.fillStyle='#a5f3fc'; ctx.font='8px "Press Start 2P"';
    ctx.fillText('os ovos estão nascendo...', W/2, 96);
    ctx.globalAlpha=1;
  }

  // 5 eggs staggered
  const delays = [0, 35, 70, 105, 140];
  const ey = 300;
  const spacing = 130;
  const startX = W/2 - spacing*2;
  for(let i=0;i<5;i++){
    const t = Math.max(0, winTimer - delays[i]);
    drawCrackingEgg(startX + i*spacing, ey, t, i);
  }

  // score fades in after all eggs open
  if(winTimer > 260){
    const sa = Math.min(1,(winTimer-260)/30);
    ctx.globalAlpha=sa;
    ctx.fillStyle='#fef9c3'; ctx.font='11px "Press Start 2P"';
    ctx.textAlign='center';
    ctx.fillText(`PONTUAÇÃO FINAL: ${score} pts`, W/2, 400);
    ctx.globalAlpha=1;
  }
  ctx.textAlign='left';
}

function quitGame(){
  if(state === 'menu') return;
  if(!confirm('Sair para o menu principal?\nO progresso será perdido.')) return;
  paused = false;
  stopBGM();
  state = 'menu';
  const ov = document.getElementById('overlay');
  ov.classList.remove('win-mode');
  ov.style.display = 'flex';
  ov.innerHTML = `<div class="ocard">
    <h1>🦕 DinoGame</h1>
    <div class="divider"></div>
    <p class="sub">Colete os ovos 🥚 · Elimine inimigos · Atravesse o portal</p>
    <div class="khint">
      <b>↑ W Espaço</b> — Pular (duplo) &nbsp;·&nbsp; <b>↓ S</b> — Agachar<br>
      <b>← A</b> — Voltar &nbsp;·&nbsp; <b>→ D</b> — Avançar<br>
      <b style="color:#fb923c">Z / X</b> — 🔥 Fogo (Dino) &nbsp;·&nbsp; <b style="color:#ffe66d">Z / X</b> — 🪓 Clava (Caveman)
    </div>
    <button class="btn" onclick="showCharSelect()">▶ Jogar</button>
  </div>`;
}

function togglePause(){
  if(state !== 'playing') return;
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  if(btn){ btn.textContent = paused ? '▶' : '⏸'; btn.classList.toggle('paused', paused); }
  if(paused) stopBGM(); else startBGM((phase-1) % BGMS.length);
}

function drawPauseOverlay(){
  ctx.fillStyle='rgba(4,8,18,.72)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fbbf24';
  ctx.font='bold 28px "Press Start 2P"';
  ctx.textAlign='center';
  ctx.fillText('PAUSADO',W/2,H/2-18);
  ctx.fillStyle='#7a8fa8';
  ctx.font='8px "Press Start 2P"';
  ctx.fillText('Pressione P ou clique ⏸ para continuar',W/2,H/2+16);
  ctx.textAlign='left';
}

function loop(){
  if(!paused){ update(); draw(); }
  else drawPauseOverlay();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
